function App() {
  const [active, setActive] = React.useState('about');
  const [showPrev, setShowPrev] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  const scrollTo = (id) => {
    setActive(id);
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 48, behavior: 'smooth' });
  };

  React.useEffect(() => {
    const onScroll = () => {
      const secs = document.querySelectorAll('section[id]');
      const y = window.scrollY + 120;
      secs.forEach(s => {
        if (y >= s.offsetTop && y < s.offsetTop + s.offsetHeight) setActive(s.id);
      });
    };
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2000); };
  const openCv = () => {
    window.open('cv.html?print=1', '_blank', 'noopener,noreferrer');
  };

  return (
    <>
      <Navbar active={active} onNavigate={scrollTo}/>
      <Hero onContact={() => scrollTo('contact')} onDownload={openCv}/>
      <Research/>
      <Education/>
      <Experience showPrev={showPrev} setShowPrev={setShowPrev}/>
      <Publications/>
      <Awards/>
      <Certifications/>
      <Writing/>
      <Expertise/>
      <Contact onEmail={() => { window.location.href = 'mailto:muktadir.munam@dal.ca'; }}/>
      <Footer/>
      {toast && (
        <div style={{position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:'var(--ink)', color:'var(--paper)', padding:'12px 20px', borderRadius:2, fontSize:13, boxShadow:'0 4px 12px rgba(0,0,0,0.12)', zIndex:2000, fontFamily:'var(--font-mono)', letterSpacing:'0.04em'}}>{toast}</div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
